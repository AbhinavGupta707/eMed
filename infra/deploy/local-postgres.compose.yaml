name: homerounds

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HOMEROUNDS_POSTGRES_USER:-homerounds}
      POSTGRES_PASSWORD: ${HOMEROUNDS_POSTGRES_PASSWORD:-homerounds}
      POSTGRES_DB: ${HOMEROUNDS_POSTGRES_DB:-homerounds}
    ports:
      - "127.0.0.1:${HOMEROUNDS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s

volumes:
  postgres-data:
