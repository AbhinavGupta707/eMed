name: Set up HomeRounds
description: Install the pinned Node, pnpm, and frozen workspace dependencies.

runs:
  using: composite
  steps:
    - name: Set up Node.js 22.22.2
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.22.2
        package-manager-cache: false

    - name: Activate the repository pnpm version
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare pnpm@10.33.0 --activate
        test "$(node --version)" = "v22.22.2"
        test "$(pnpm --version)" = "10.33.0"

    - name: Install the frozen dependency graph
      shell: bash
      run: pnpm install --frozen-lockfile
